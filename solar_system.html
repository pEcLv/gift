        function createCometBasis() {
            const up = new THREE.Vector3(0, 1, 0);
            const tangentA = new THREE.Vector3();
            const tangentB = new THREE.Vector3();
            if (Math.abs(COMET_DIRECTION.dot(up)) > 0.999) {
                tangentA.set(1, 0, 0);
            } else {
                tangentA.crossVectors(up, COMET_DIRECTION).normalize();
            }
            tangentB.crossVectors(COMET_DIRECTION, tangentA).normalize();
            return { tangentA, tangentB };
        }

        function resetCometParticle(index, randomize = false) {
            const data = cometTailData[index] || {};
            data.d = randomize ? Math.random() * COMET_TAIL_LENGTH : 0;
            data.speed = 0.028 + Math.random() * 0.052;
            data.radialA = (Math.random() - 0.5) * 1.65;
            data.radialB = (Math.random() - 0.5) * 1.65;
            data.radiusScale = 0.24 + Math.random() * 0.86;
            data.phase = Math.random() * Math.PI * 2;
            cometTailData[index] = data;
        }

        function resetCometStreamer(index, randomize = false) {
            const data = cometStreamerData[index] || {};
            data.d = randomize ? Math.random() * COMET_TAIL_LENGTH : 0;
            data.speed = 0.035 + Math.random() * 0.058;
            data.angle = Math.random() * Math.PI * 2;
            data.radius = 0.1 + Math.random() * 0.78;
            data.phase = Math.random() * Math.PI * 2;
            cometStreamerData[index] = data;
        }

        function updateComet(time, delta) {
            if (!cometGroup) return;

            cometGroup.visible = activeStage === "planet";
            if (!cometGroup.visible) return;

            const tangentA = cometGroup.userData.tangentA;
            const tangentB = cometGroup.userData.tangentB;
            const frameScale = delta * 60;

            cometGroup.position.set(
                COMET_ORIGIN.x + Math.sin(time * 0.08) * 1.25,
                COMET_ORIGIN.y + Math.cos(time * 0.11) * 0.46,
                COMET_ORIGIN.z + Math.sin(time * 0.05) * 0.7
            );
            cometGroup.rotation.z = Math.sin(time * 0.12) * 0.05;

            const pulse = 1 + Math.sin(time * 7.4) * 0.045;
            cometCoreMesh.scale.setScalar(pulse);
            cometInnerCoreMesh.scale.setScalar(1 + Math.sin(time * 10.5) * 0.07);
            cometLight.intensity = 0.9 + Math.sin(time * 5.2) * 0.22;
            cometSparkPoints.rotation.z = time * 1.25;
            cometSparkPoints.rotation.y = time * 0.85;

            updateCometTailParticles(time, frameScale, tangentA, tangentB);
            updateCometStreamers(time, frameScale, tangentA, tangentB);
        }

        function updateCometTailParticles(time, frameScale, tangentA, tangentB) {
            const pos = cometTailPoints.geometry.attributes.position.array;
            const col = cometTailPoints.geometry.attributes.color.array;

            for (let i = 0; i < COMET_PARTICLE_COUNT; i++) {
                const data = cometTailData[i];
                data.d += data.speed * frameScale;
                if (data.d > COMET_TAIL_LENGTH) {
                    resetCometParticle(i);
                }

                const t = data.d / COMET_TAIL_LENGTH;
                const spread = t * 1.42 * data.radiusScale;
                const waveA = Math.sin(data.d * 0.86 - time * 2.7 + data.phase) * 0.28 * t;
                const waveB = Math.cos(data.d * 0.64 - time * 2.2 + data.phase) * 0.28 * t;
                const radialA = data.radialA * spread + waveA;
                const radialB = data.radialB * spread + waveB;
                const index = i * 3;

                pos[index] = COMET_DIRECTION.x * data.d + tangentA.x * radialA + tangentB.x * radialB;
                pos[index + 1] = COMET_DIRECTION.y * data.d + tangentA.y * radialA + tangentB.y * radialB;
                pos[index + 2] = COMET_DIRECTION.z * data.d + tangentA.z * radialA + tangentB.z * radialB;

                const hue = 0.52 + (0.85 - 0.52) * Math.pow(t, 0.82);
                const saturation = 0.88 - t * 0.2;
                const lightness = 0.86 * (1 - t * 0.78) + 0.12;
                cometTempColor.setHSL(hue, saturation, Math.min(1, lightness));
                col[index] = cometTempColor.r;
                col[index + 1] = cometTempColor.g;
                col[index + 2] = cometTempColor.b;
            }

            cometTailPoints.geometry.attributes.position.needsUpdate = true;
            cometTailPoints.geometry.attributes.color.needsUpdate = true;
        }

        function updateCometStreamers(time, frameScale, tangentA, tangentB) {
            const pos = cometStreamerPoints.geometry.attributes.position.array;

            for (let i = 0; i < COMET_STREAMER_COUNT; i++) {
                const data = cometStreamerData[i];
                data.d += data.speed * frameScale;
                if (data.d > COMET_TAIL_LENGTH) {
                    resetCometStreamer(i);
                }

                const t = data.d / COMET_TAIL_LENGTH;
                const r = data.radius * t * 2.25;
                const angle = data.angle + time * 2.75 + data.phase;
                const radialA = Math.cos(angle) * r;
                const radialB = Math.sin(angle) * r;
                const index = i * 3;

                pos[index] = COMET_DIRECTION.x * data.d + tangentA.x * radialA + tangentB.x * radialB;
                pos[index + 1] = COMET_DIRECTION.y * data.d + tangentA.y * radialA + tangentB.y * radialB;
                pos[index + 2] = COMET_DIRECTION.z * data.d + tangentA.z * radialA + tangentB.z * radialB;
            }

            cometStreamerPoints.geometry.attributes.position.needsUpdate = true;
        }

        function setupUI() {
            const nav = document.getElementById("planet-nav");

            document.querySelectorAll(".mode-tab").forEach((button) => {
                button.addEventListener("click", () => switchStage(button.dataset.stage));
            });

            PLANET_ORDER.forEach((key) => {
                const planet = PLANETS[key];
                const button = document.createElement("button");
                button.type = "button";
                button.className = "planet-button";
                button.dataset.planet = key;
                button.style.setProperty("--planet-color", planet.color);
                button.innerHTML = `<span class="nav-orb"></span><span class="nav-label">${planet.name}</span>`;
                button.addEventListener("click", () => switchPlanet(key));
                nav.appendChild(button);
            });

            gestureButton.addEventListener("click", startGestureControl);
        }

        function setupEvents() {
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
                resizeHandOverlay();
            });

            window.addEventListener("pointerdown", (event) => {
                if (event.target.closest(".chrome")) return;
                pointerDown = { x: event.clientX, y: event.clientY };
                isDragging = false;
            });

            window.addEventListener("pointermove", (event) => {
                if (!pointerDown) return;
                const dx = event.clientX - pointerDown.x;
                const dy = event.clientY - pointerDown.y;
                if (Math.abs(dx) + Math.abs(dy) > 4) isDragging = true;
                manualRotY += dx * 0.0009;
                manualRotX += dy * 0.0006;
                manualRotX = THREE.MathUtils.clamp(manualRotX, -0.48, 0.62);
                pointerDown = { x: event.clientX, y: event.clientY };
            });

            window.addEventListener("pointermove", (event) => {
                pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
                pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                if (activeStage === "planet") {
                    const planet = PLANETS[activePlanetKey];
                    raycaster.setFromCamera(pointer, camera);
                    const sphereRadius = planet.radius * planet.displayScale;
                    const planetSphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), sphereRadius);
                    const intersectPoint = new THREE.Vector3();
                    if (raycaster.ray.intersectSphere(planetSphere, intersectPoint)) {
                        targetMouse3D.copy(intersectPoint);
                        mouseIntensityTarget = 1.0;
                    } else {
                        mouseIntensityTarget = 0.0;
                    }
                } else {
                    mouseIntensityTarget = 0.0;
                }
            });

            window.addEventListener("pointerup", (event) => {
                if (!isDragging) {
                    const key = pickCompanion(event);
                    if (key) switchPlanet(key);
                }
                pointerDown = null;
                isDragging = false;
            });

            window.addEventListener("wheel", (event) => {
                if (event.target.closest(".chrome")) return;
                targetCameraDistance = clampCameraDistance(targetCameraDistance + event.deltaY * 0.012);
            }, { passive: true });
        }

        async function startGestureControl() {
            if (!navigator.mediaDevices?.getUserMedia) {
                setGestureMessage("当前浏览器不支持摄像头");
                return;
            }

            if (!window.Hands) {
                setGestureMessage("手势库未加载");
                return;
            }

            gestureButton.disabled = true;
            gestureButton.textContent = "启动中";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 960 },
                        height: { ideal: 540 },
                        facingMode: "user"
                    },
                    audio: false
                });

                cameraPreview.srcObject = stream;
                await cameraPreview.play();
                document.body.classList.add("camera-on");
                resizeHandOverlay();

                const hands = new window.Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.72,
                    minTrackingConfidence: 0.72
                });
                hands.onResults(handleHandResults);

                gestureButton.textContent = "手势运行中";
                runHandLoop(hands);
            } catch (error) {
                gestureButton.disabled = false;
                gestureButton.textContent = "启动手势控制";
                setGestureMessage(error?.message || "摄像头启动失败");
            }
        }

        async function runHandLoop(hands) {
            let busy = false;
            const tick = async () => {
                if (cameraPreview.readyState >= 2 && !busy) {
                    busy = true;
                    try {
                        await hands.send({ image: cameraPreview });
                    } catch {
                        setGestureMessage("手势识别暂停");
                    } finally {
                        busy = false;
                    }
                }
                requestAnimationFrame(tick);
            };
            tick();
        }

        function handleHandResults(results) {
            resizeHandOverlay();
            const hands = results.multiHandLandmarks || [];
            const landmarks = hands[0];
            drawHandOverlay(hands);

            if (!landmarks) {
                if (performance.now() - gestureControl.lastSeen > 350) {
                    setGestureMode("idle", "未检测到手");
                    gestureControl.previousPinchCenter = null;
                    gestureControl.pinchLocked = false;
                    gestureControl.pendingDirection = null;
                }
                return;
            }

            gestureControl.lastSeen = performance.now();

            if (hands.length >= 2) {
                gestureControl.pinchLocked = false;
                applyTwoHandGesture(analyzeTwoHands(hands[0], hands[1]));
                return;
            }

            applyGestureAnalysis(analyzeHand(landmarks));
        }

        function analyzeHand(landmarks) {
            const point = (index) => {
                const landmark = landmarks[index];
                return { x: 1 - landmark.x, y: landmark.y, z: landmark.z };
            };
            const wrist = point(0);
            const indexMcp = point(5);
            const middleMcp = point(9);
            const ringMcp = point(13);
            const pinkyMcp = point(17);
            const palmCenter = {
                x: (wrist.x + indexMcp.x + middleMcp.x + ringMcp.x + pinkyMcp.x) / 5,
                y: (wrist.y + indexMcp.y + middleMcp.y + ringMcp.y + pinkyMcp.y) / 5
            };
            const palmSpan = Math.max(distance2D(indexMcp, pinkyMcp), distance2D(wrist, middleMcp) * 0.74, 0.045);
            const thumbTip = point(4);
            const indexTip = point(8);
            const indexPip = point(6);
            const middleTip = point(12);
            const middleMcpPoint = point(9);

            const extended = {
                index: isFingerExtended(indexTip, indexPip, point(5), palmCenter, palmSpan),
                middle: isFingerExtended(middleTip, point(10), middleMcpPoint, palmCenter, palmSpan),
                ring: isFingerExtended(point(16), point(14), point(13), palmCenter, palmSpan),
                pinky: isFingerExtended(point(20), point(18), point(17), palmCenter, palmSpan)
            };
            const openFingerCount = ["index", "middle", "ring", "pinky"].filter((key) => extended[key]).length;
            const thumbReach = distance2D(thumbTip, palmCenter) / palmSpan;
            const indexReach = distance2D(indexTip, palmCenter) / palmSpan;
            const indexPipReach = distance2D(indexPip, palmCenter) / palmSpan;
            const pinchDistance = distance2D(thumbTip, indexTip) / palmSpan;
            const pinchCenter = midpoint2D(thumbTip, indexTip);
            const pinchCenterReach = distance2D(pinchCenter, palmCenter) / palmSpan;
            const fist = openFingerCount === 0 && thumbReach < 1.12 && indexReach < 1.08;
            const pinchThreshold = gestureControl.pinchLocked ? 0.52 : 0.38;
            const pinchShape = extended.index || openFingerCount > 0 || indexReach > indexPipReach * 0.98;
            const pinch = !fist && pinchShape && pinchCenterReach > 0.58 && pinchDistance < pinchThreshold;
            gestureControl.pinchLocked = pinch;

            const indexVector = normalize2D({
                x: indexTip.x - indexMcp.x,
                y: indexTip.y - indexMcp.y
            });
            const middleVector = normalize2D({
                x: middleTip.x - middleMcpPoint.x,
                y: middleTip.y - middleMcpPoint.y
            });
            const twoFingerPoint = extended.index && extended.middle && !extended.ring && !extended.pinky;
            const pointingVector = twoFingerPoint
                ? normalize2D({
                    x: indexVector.x + middleVector.x,
                    y: indexVector.y + middleVector.y
                })
                : indexVector;

            return {
                pinch,
                palmCenter,
                pointingVector,
                isSingleIndex: extended.index && !extended.middle && !extended.ring && !extended.pinky,
                isTwoFingerPoint: twoFingerPoint,
                isFist: fist,
                isOpen: openFingerCount >= 4 && !pinch
            };
        }

        function analyzeTwoHands(firstHand, secondHand) {
            const first = getPalmMetrics(firstHand);
            const second = getPalmMetrics(secondHand);
            const span = Math.max((first.palmSpan + second.palmSpan) * 0.5, 0.045);
            const gap = distance2D(first.palmCenter, second.palmCenter) / span;
            const spread = THREE.MathUtils.clamp((gap - 2.15) / 4.4, 0, 1);
            return { spread };
        }

        function applyTwoHandGesture(analysis) {
            resetDirectionHold();
            gestureControl.previousPinchCenter = null;
            targetGestureSpread = activeStage === "planet" ? analysis.spread : 0;
            setGestureMode("twoHand", analysis.spread > 0.45 ? "双手分开：粒子扩散" : "双手靠近：粒子合并");
        }

        function applyGestureAnalysis(analysis) {
            const now = performance.now();

            if (analysis.pinch) {
                setGestureMode("pinch", "捏住：调整视角");
                if (gestureControl.previousPinchCenter) {
                    const dx = analysis.palmCenter.x - gestureControl.previousPinchCenter.x;
                    const dy = analysis.palmCenter.y - gestureControl.previousPinchCenter.y;
                    manualRotY += dx * 3.45;
                    manualRotX += dy * 2.6;
                    manualRotX = THREE.MathUtils.clamp(manualRotX, -0.48, 0.62);
                }
                gestureControl.previousPinchCenter = analysis.palmCenter;
                resetDirectionHold();
                return;
            }

            gestureControl.previousPinchCenter = null;

            if (analysis.isSingleIndex || analysis.isTwoFingerPoint) {
                const horizontal = Math.abs(analysis.pointingVector.x);
                const direction = horizontal > 0.54 && horizontal > Math.abs(analysis.pointingVector.y) * 1.08
                    ? Math.sign(analysis.pointingVector.x)
                    : 0;

                if (direction !== 0) {
                    setGestureMode(direction < 0 ? "pointLeft" : "pointRight", direction < 0 ? "指向左：上一个星球" : "指向右：下一个星球");
                    holdDirection(direction, now);
                    return;
                }
            }

            resetDirectionHold();

            if (analysis.isFist) {
                setGestureMode("fist", "握拳：放大视角");
                return;
            }

            if (analysis.isOpen) {
                setGestureMode("open", "张掌：缩小视角");
                return;
            }

            setGestureMode("tracking", "跟踪中");
        }

        function holdDirection(direction, now) {
            if (gestureControl.pendingDirection !== direction) {
                gestureControl.pendingDirection = direction;
                gestureControl.pendingSince = now;
                return;
            }

            if (now - gestureControl.pendingSince > 250 && now - gestureControl.lastSwitchAt > 780) {
                switchRelativePlanet(direction);
                gestureControl.lastSwitchAt = now;
                gestureControl.pendingSince = now + 420;
            }
        }

        function resetDirectionHold() {
            gestureControl.pendingDirection = null;
            gestureControl.pendingSince = 0;
        }

        function switchRelativePlanet(direction) {
            const currentIndex = PLANET_ORDER.indexOf(activePlanetKey);
            const nextIndex = (currentIndex + direction + PLANET_ORDER.length) % PLANET_ORDER.length;
            switchPlanet(PLANET_ORDER[nextIndex]);
            setGestureMessage(direction < 0 ? `已切到左侧：${PLANETS[activePlanetKey].name}` : `已切到右侧：${PLANETS[activePlanetKey].name}`);
        }

        function setGestureMode(mode, message) {
            gestureControl.mode = mode;
            setGestureMessage(message);
            document.querySelectorAll(".gesture-token").forEach((token) => {
                token.classList.toggle("active", token.dataset.gesture === mode);
            });
        }

        function setGestureMessage(message) {
            gestureState.textContent = message;
        }

        function clampCameraDistance(distance) {
            return THREE.MathUtils.clamp(distance, MIN_CAMERA_DISTANCE, MAX_CAMERA_DISTANCE);
        }

        function resizeHandOverlay() {
            const rect = handOverlay.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width * window.devicePixelRatio));
            const height = Math.max(1, Math.floor(rect.height * window.devicePixelRatio));
            if (handOverlay.width !== width || handOverlay.height !== height) {
                handOverlay.width = width;
                handOverlay.height = height;
            }
        }

        function drawHandOverlay(handSets) {
            handOverlayContext.clearRect(0, 0, handOverlay.width, handOverlay.height);
            if (!handSets.length) return;

            const chains = [
                [0, 1, 2, 3, 4],
                [0, 5, 6, 7, 8],
                [0, 9, 10, 11, 12],
                [0, 13, 14, 15, 16],
                [0, 17, 18, 19, 20],
                [5, 9, 13, 17]
            ];

            handOverlayContext.save();
            handOverlayContext.lineWidth = 2;
            handOverlayContext.strokeStyle = "rgba(240, 191, 98, 0.82)";
            handOverlayContext.fillStyle = "rgba(134, 214, 255, 0.9)";

            handSets.forEach((landmarks) => {
                chains.forEach((chain) => {
                    handOverlayContext.beginPath();
                    chain.forEach((index, chainIndex) => {
                        const x = landmarks[index].x * handOverlay.width;
                        const y = landmarks[index].y * handOverlay.height;
                        if (chainIndex === 0) handOverlayContext.moveTo(x, y);
                        else handOverlayContext.lineTo(x, y);
                    });
                    handOverlayContext.stroke();
                });

                landmarks.forEach((landmark, index) => {
                    handOverlayContext.beginPath();
                    handOverlayContext.arc(
                        landmark.x * handOverlay.width,
                        landmark.y * handOverlay.height,
                        index === 8 || index === 12 ? 4 : 2.5,
                        0,
                        Math.PI * 2
                    );
                    handOverlayContext.fill();
                });
            });

            handOverlayContext.restore();
        }

        function getPalmMetrics(landmarks) {
            const point = (index) => {
                const landmark = landmarks[index];
                return { x: 1 - landmark.x, y: landmark.y, z: landmark.z };
            };
            const wrist = point(0);
            const indexMcp = point(5);
            const middleMcp = point(9);
            const ringMcp = point(13);
            const pinkyMcp = point(17);
            const palmCenter = {
                x: (wrist.x + indexMcp.x + middleMcp.x + ringMcp.x + pinkyMcp.x) / 5,
                y: (wrist.y + indexMcp.y + middleMcp.y + ringMcp.y + pinkyMcp.y) / 5
            };
            const palmSpan = Math.max(distance2D(indexMcp, pinkyMcp), distance2D(wrist, middleMcp) * 0.74, 0.045);
            return { palmCenter, palmSpan };
        }

        function isFingerExtended(tip, pip, mcp, palmCenter, palmSpan) {
            const length = distance2D(tip, mcp);
            const tipReach = distance2D(tip, palmCenter);
            const pipReach = distance2D(pip, palmCenter);
            return length > palmSpan * 0.62 && tipReach > pipReach * 1.05;
        }

        function distance2D(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function midpoint2D(a, b) {
            return {
                x: (a.x + b.x) * 0.5,
                y: (a.y + b.y) * 0.5
            };
        }

        function normalize2D(vector) {
            const length = Math.sqrt(vector.x * vector.x + vector.y * vector.y) || 1;
            return { x: vector.x / length, y: vector.y / length };
        }

        function switchStage(stage, immediate = false) {
            if (stage !== "planet") return;
            activeStage = stage;
            updateStageUI();

            const planet = PLANETS[activePlanetKey];

            targetTilt = planet.tilt;
            targetRingOpacity = planet.ring ? planet.ring.opacity : 0.0;
            document.documentElement.style.setProperty("--active-planet", planet.color);
            document.documentElement.style.setProperty("--active-glow", planet.glow);
            
            targetAtmosphereScale = planet.radius * planet.displayScale * 1.015;
            targetAtmosphereColor.set(planet.color);

            targetCoreScale = planet.radius * planet.displayScale;
            targetCoreOpacity = coreOpacityFor(planet);
            
            if (bodyMaterial) {
                bodyMaterial.uniforms.uPlanetType.value = TYPE_MAP[planet.type];
                bodyMaterial.uniforms.uSpinSpeed.value = planet.spin;
            }
            if (ringMaterial) {
                ringMaterial.uniforms.uPlanetType.value = TYPE_MAP[planet.type];
                if (planet.ring) {
                    ringMaterial.uniforms.uRingSpeed.value = 0.04;
                    ringMaterial.uniforms.uInnerRadius.value = planet.ring.inner;
                    ringMaterial.uniforms.uOuterRadius.value = planet.ring.outer;
                }
            }
            
            setBodyTargets(planet);
            setRingTargets(planet);
            updateReadout(planet, activePlanetKey);

            if (bodyColorTo && ringColorTo) {
                bodyColorTo.set(bodyColors);
                ringColorTo.set(ringColors);
            }

            if (immediate) {
                snapPlanetTransition();
                bodyPositions.set(bodyTargets);
                ringPositions.set(ringTargets);
                bodyPoints.geometry.attributes.position.needsUpdate = true;
                ringPoints.geometry.attributes.position.needsUpdate = true;
                
                if (ringMaterial) {
                    ringMaterial.uniforms.uOpacity.value = targetRingOpacity;
                }
                displayGroup.rotation.x = manualRotX + targetTilt;
                
                if (atmosphereMesh) {
                    atmosphereMesh.scale.setScalar(targetAtmosphereScale);
                    atmosphereMaterial.uniforms.uColor.value.copy(targetAtmosphereColor);
                }
                applyPlanetShellImmediate();
            }
        }

        function updateStageUI() {
            document.body.dataset.stage = activeStage;
            stageTitle.textContent = "粒子太阳系";
            stageEyebrow.textContent = "Particle Solar System";
            document.querySelectorAll(".mode-tab").forEach((button) => {
                button.classList.toggle("active", button.dataset.stage === activeStage);
            });
        }

        function switchPlanet(key, immediate = false) {
            const planet = PLANETS[key];
            if (!planet) return;

            const previousPlanetKey = activePlanetKey;
            if (!immediate && previousPlanetKey === key) return;

            const animateTransition = !immediate && bodyPoints && ringPoints && bodyColorFrom && bodyColorTo && ringColorFrom && ringColorTo;
            if (animateTransition) {
                bodyColorFrom.set(bodyColors);
                ringColorFrom.set(ringColors);
            }

            activePlanetKey = key;
            activeStage = "planet";
            updateStageUI();
            targetTilt = planet.tilt;
            targetRingOpacity = planet.ring ? planet.ring.opacity : 0.0;
            document.documentElement.style.setProperty("--active-planet", planet.color);
            document.documentElement.style.setProperty("--active-glow", planet.glow);

            targetAtmosphereScale = planet.radius * planet.displayScale * 1.015;
            targetAtmosphereColor.set(planet.color);

            targetCoreScale = planet.radius * planet.displayScale;
            targetCoreOpacity = coreOpacityFor(planet);
            
            if (bodyMaterial) {
                bodyMaterial.uniforms.uPlanetType.value = TYPE_MAP[planet.type];
                bodyMaterial.uniforms.uSpinSpeed.value = planet.spin;
            }
            if (ringMaterial) {
                ringMaterial.uniforms.uPlanetType.value = TYPE_MAP[planet.type];
                if (planet.ring) {
                    ringMaterial.uniforms.uRingSpeed.value = 0.04;
                    ringMaterial.uniforms.uInnerRadius.value = planet.ring.inner;
                    ringMaterial.uniforms.uOuterRadius.value = planet.ring.outer;
                }
            }

            setBodyTargets(planet);
            setRingTargets(planet);
            updateReadout(planet, key);

            if (animateTransition) {
                beginPlanetTransition(previousPlanetKey, key);
            }

            if (!animateTransition) {
                if (bodyColorTo && ringColorTo) {
                    bodyColorTo.set(bodyColors);
                    ringColorTo.set(ringColors);
                }
                snapPlanetTransition();
            }

            if (immediate) {
                if (ringMaterial) {
                    ringMaterial.uniforms.uOpacity.value = targetRingOpacity;
                }
                displayGroup.rotation.x = manualRotX + targetTilt;
                
                if (atmosphereMesh) {
                    atmosphereMesh.scale.setScalar(targetAtmosphereScale);
                    atmosphereMaterial.uniforms.uColor.value.copy(targetAtmosphereColor);
                }
                applyPlanetShellImmediate();
            }
        }

        function coreOpacityFor(planet) {
            if (planet.type === "saturn") return 0.72;
            if (planet.type === "banded") return 0.66;
            if (planet.type === "earth") return 0.48;
            if (planet.type === "cloud") return 0.44;
            if (planet.type === "ice") return 0.42;
            return 0.54;
        }

        function applyPlanetShellImmediate() {
            if (planetCoreMesh && planetCoreMaterial) {
                planetCoreMesh.visible = targetCoreOpacity > 0.01;
                planetCoreMesh.scale.setScalar(targetCoreScale * 0.994);
                planetCoreMaterial.opacity = targetCoreOpacity;
            }
            if (depthMaskMesh) {
                depthMaskMesh.visible = activeStage === "planet" && targetRingOpacity > 0.01;
                depthMaskMesh.scale.setScalar(targetCoreScale * 1.006);
            }
        }

        function beginPlanetTransition(fromKey, toKey) {
            if (!bodyPoints || !ringPoints || !bodyColorFrom || !bodyColorTo || !ringColorFrom || !ringColorTo) return;

            planetTransition.active = fromKey !== toKey;
            planetTransition.startedAt = clock.getElapsedTime();
            planetTransition.fromKey = fromKey;
            planetTransition.toKey = toKey;
            planetTransition.progress = 0;
            planetTransition.eased = 0;
            planetTransition.vortexWeight = 0;
            planetTransition.colorMix = 0;

            bodyColorTo.set(bodyColors);
            ringColorTo.set(ringColors);
            bodyColors.set(bodyColorFrom);
            ringColors.set(ringColorFrom);

            bodyPoints.geometry.attributes.color.needsUpdate = true;
            ringPoints.geometry.attributes.color.needsUpdate = true;
        }

        function updatePlanetTransition(time) {
            if (!planetTransition.active) return;

            const progress = THREE.MathUtils.clamp((time - planetTransition.startedAt) / planetTransition.duration, 0, 1);
            planetTransition.progress = progress;
            planetTransition.eased = THREE.MathUtils.smoothstep(progress, 0, 1);
            planetTransition.vortexWeight = Math.sin(progress * Math.PI);
            planetTransition.colorMix = THREE.MathUtils.smoothstep(progress, 0.2, 0.72);

            mixTransitionColors();

            if (progress >= 1) {
                snapPlanetTransition();
            }
        }

        function mixTransitionColors() {
            if (!bodyColorFrom || !bodyColorTo || !ringColorFrom || !ringColorTo) return;

            mixColorBuffer(bodyColors, bodyColorFrom, bodyColorTo, planetTransition.colorMix);
            mixColorBuffer(ringColors, ringColorFrom, ringColorTo, planetTransition.colorMix);

            bodyPoints.geometry.attributes.color.needsUpdate = true;
            ringPoints.geometry.attributes.color.needsUpdate = true;
        }

        function mixColorBuffer(visible, from, to, amount) {
            for (let i = 0; i < visible.length; i++) {
                visible[i] = from[i] + (to[i] - from[i]) * amount;
            }
        }

        function snapPlanetTransition() {
            planetTransition.active = false;
            planetTransition.progress = 1;
            planetTransition.eased = 1;
            planetTransition.vortexWeight = 0;
            planetTransition.colorMix = 1;

            if (!bodyPoints || !ringPoints) return;

            bodyPositions.set(bodyTargets);
            ringPositions.set(ringTargets);
            bodyColors.set(bodyColorTo);
            ringColors.set(ringColorTo);
            bodyColorFrom.set(bodyColors);
            ringColorFrom.set(ringColors);

            bodyPoints.geometry.attributes.position.needsUpdate = true;
            ringPoints.geometry.attributes.position.needsUpdate = true;
            bodyPoints.geometry.attributes.color.needsUpdate = true;
            ringPoints.geometry.attributes.color.needsUpdate = true;
        }

        function updateReadout(planet, key) {
            const orbitalState = computeOrbitalState(key, ORRERY_DATE);
            document.getElementById("planet-name").textContent = planet.name;
            document.getElementById("planet-en").textContent = planet.en;
            document.getElementById("planet-summary").textContent = planet.summary;
            document.getElementById("metric-orbit").textContent = planet.orbit;
            document.getElementById("metric-radius").textContent = planet.radiusLabel;
            document.getElementById("metric-day").textContent = planet.day;
            document.getElementById("ephemeris-date").textContent = formatOrreryDate(ORRERY_DATE);
            document.getElementById("ephemeris-distance").textContent = `${orbitalState.distanceAu.toFixed(2)} AU`;
            document.getElementById("ephemeris-longitude").textContent = `${orbitalState.longitudeDeg.toFixed(1)}°`;

            document.querySelectorAll(".planet-button").forEach((button) => {
                button.classList.toggle("active", button.dataset.planet === key);
            });
            updateOrreryFocus(key);
        }

        function updateOrreryFocus(key) {
            if (!orbitLinesGroup || !companionGroup) return;

            orbitLinesGroup.children.forEach((child) => {
                if (child.userData.kind !== "orbitLine" || !child.material) return;
                child.visible = SHOW_ORBIT_LINES;
                child.material.opacity = child.userData.key === key ? 0.44 : 0.14;
            });

            companionGroup.children.forEach((pivot) => {
                const selected = pivot.userData.key === key;
                const body = pivot.children[0];
                const halo = pivot.userData.halo;
                if (body && body.material.uniforms) {
                    body.material.uniforms.uGlowIntensity.value = selected ? 1.15 : 0.65;
                }
                if (halo) {
                    halo.material.opacity = selected ? 0.46 : 0.0;
                }
            });
        }

        function formatOrreryDate(date) {
            return new Intl.DateTimeFormat("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit"
            }).format(date);
        }

        function setBodyTargets(planet) {
            const color = new THREE.Color();
            const radius = planet.radius * planet.displayScale;

            for (let i = 0; i < BODY_COUNT; i++) {
                const seed = bodySeeds[i];
                const root = Math.sqrt(1 - seed.z * seed.z);
                const theta = seed.theta + seed.orbit * 0.03;
                const shell = radius * (0.55 + 0.45 * seed.shell);
                let x = shell * root * Math.cos(theta);
                let y = shell * seed.z;
                let z = shell * root * Math.sin(theta);

                if (planet.type === "banded" || planet.type === "saturn") {
                    const band = Math.sin(seed.z * Math.PI * 10.5);
                    x *= 1 + band * 0.012;
                    z *= 1 + band * 0.012;
                }

                if (planet.type === "ice") {
                    y *= 0.97;
                }

                bodyTargets[i * 3] = x;
                bodyTargets[i * 3 + 1] = y;
                bodyTargets[i * 3 + 2] = z;

                color.set(pickBodyColor(planet, seed));
                bodyColors[i * 3] = color.r;
                bodyColors[i * 3 + 1] = color.g;
                bodyColors[i * 3 + 2] = color.b;
            }

            bodyPoints.geometry.attributes.color.needsUpdate = true;
        }

        function pickBodyColor(planet, seed) {
            const lat = Math.abs(seed.z);
            const band = Math.floor((seed.z + 1) * 8 + seed.noise * 2) % planet.palette.length;

            if (planet.type === "earth") {
                if (lat > 0.78 || seed.noise > 0.93) return "#e8f4ff";
                if (Math.sin(seed.theta * 2.7 + seed.z * 7.2) + seed.noise * 0.9 > 0.72) return "#3d9f70";
                if (Math.cos(seed.theta * 3.4 - seed.z * 5.5) + seed.noise > 1.12) return "#b98f5a";
                return seed.noise > 0.22 ? "#2c8ddb" : "#1b4f8f";
            }

            if (planet.type === "banded") {
                const stripe = Math.floor((seed.z + 1) * 14);
                return planet.palette[(stripe + (seed.noise > 0.72 ? 1 : 0)) % planet.palette.length];
            }

            if (planet.type === "saturn") {
                const stripe = Math.floor((seed.z + 1) * 12);
                return planet.palette[(stripe + (seed.noise > 0.84 ? 1 : 0)) % planet.palette.length];
            }

            if (planet.type === "cloud") {
                return seed.noise > 0.72 ? planet.palette[0] : planet.palette[band];
            }

            if (planet.type === "rock") {
                return seed.noise > 0.88 ? planet.palette[3] : planet.palette[band];
            }

            if (planet.type === "ice") {
                return seed.noise > 0.82 ? planet.palette[0] : planet.palette[band];
            }

            return planet.palette[band];
        }

        function setRingTargets(planet) {
            const color = new THREE.Color();
            const hasRing = Boolean(planet.ring);
            const ring = planet.ring || {
                inner: planet.radius * 0.95,
                outer: planet.radius * 1.05,
                thickness: 0.03,
                palette: planet.palette,
                tilt: 0
            };

            for (let i = 0; i < RING_COUNT; i++) {
                const seed = ringSeeds[i];
                const radiusSeed = Math.pow(seed.radius, 0.58);
                let radius = ring.inner + (ring.outer - ring.inner) * radiusSeed;
                const angle = seed.angle;
                let alphaGap = 1;

                if (hasRing && planet.en === "Saturn") {
                    // Let the GPU shader handle the physical gap perfectly.
                }

                if (!hasRing) {
                    radius = planet.radius * (1.3 + seed.radius * 0.22);
                }

                ringTargets[i * 3] = radius * Math.cos(angle);
                ringTargets[i * 3 + 1] = seed.height * ring.thickness * (hasRing ? 1 : 0.2);
                ringTargets[i * 3 + 2] = radius * Math.sin(angle);

                const palette = ring.palette;
                let c;
                if (hasRing && planet.en === "Saturn") {
                    const normalized = (radius - ring.inner) / (ring.outer - ring.inner);
                    if (normalized < 0.46) {
                        // Inner ring: bright gold/cream
                        c = palette[Math.floor(seed.band * 2) % 2];
                    } else {
                        // Outer ring: dark brown/grey
                        c = palette[2 + (Math.floor(seed.band * 2) % 2)];
                    }
                } else {
                    c = palette[Math.floor(seed.band * palette.length) % palette.length];
                }
                color.set(c);
                color.multiplyScalar(hasRing ? alphaGap : 0.25);
                ringColors[i * 3] = color.r;
                ringColors[i * 3 + 1] = color.g;
                ringColors[i * 3 + 2] = color.b;
            }

            ringPoints.rotation.x = ring.tilt;
            ringPoints.rotation.z = ring.roll || 0;
            ringPoints.geometry.attributes.color.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = Math.min(Math.max(time - lastFrameTime, 0), 0.04);
            lastFrameTime = time;
            const planet = PLANETS[activePlanetKey];
            updatePlanetTransition(time);

            if (activeStage !== "planet") targetGestureSpread = 0;
            if (gestureControl.mode === "fist") {
                targetCameraDistance = clampCameraDistance(targetCameraDistance - delta * 8.8);
            }
            if (gestureControl.mode === "open") {
                targetCameraDistance = clampCameraDistance(targetCameraDistance + delta * 8.8);
            }

            gestureSpread = THREE.MathUtils.lerp(gestureSpread, targetGestureSpread, 0.075);
            moveBodyAttribute(0.045);
            moveRingAttribute(0.052);
            bodyPoints.geometry.attributes.position.needsUpdate = true;
            ringPoints.geometry.attributes.position.needsUpdate = true;

            // GPU uniform updates
            if (bodyMaterial) {
                bodyMaterial.uniforms.uTime.value = time;
                bodyMaterial.uniforms.uSize.value = THREE.MathUtils.lerp(bodyMaterial.uniforms.uSize.value, 0.068, 0.08);
                bodyPoints.rotation.y += planet.spin * 0.3;
            }
            
            if (ringMaterial) {
                ringMaterial.uniforms.uTime.value = time;
                ringMaterial.uniforms.uSize.value = THREE.MathUtils.lerp(ringMaterial.uniforms.uSize.value, 0.055, 0.08);
                const nextOpacity = THREE.MathUtils.lerp(ringMaterial.uniforms.uOpacity.value, targetRingOpacity, 0.06);
                ringMaterial.uniforms.uOpacity.value = nextOpacity;
                ringPoints.rotation.z += planet.ring ? 0.0002 : 0.0001;
            }

            if (starPoints && starPoints.material.uniforms) {
                starPoints.material.uniforms.uTime.value = time;
                starPoints.rotation.y += 0.00008;
            }

            // Atmosphere interpolation
            if (atmosphereMesh && atmosphereMaterial) {
                atmosphereMesh.visible = (activeStage === "planet");
                atmosphereMesh.scale.setScalar(THREE.MathUtils.lerp(atmosphereMesh.scale.x, targetAtmosphereScale, 0.05));
                atmosphereMaterial.uniforms.uColor.value.lerp(targetAtmosphereColor, 0.05);
            }

            if (planetCoreMesh && planetCoreMaterial) {
                planetCoreMesh.visible = activeStage === "planet" && targetCoreOpacity > 0.01;
                planetCoreMesh.scale.setScalar(THREE.MathUtils.lerp(planetCoreMesh.scale.x, targetCoreScale * 0.994, 0.06));
                planetCoreMaterial.opacity = THREE.MathUtils.lerp(planetCoreMaterial.opacity, targetCoreOpacity, 0.06);
            }

            if (depthMaskMesh) {
                depthMaskMesh.visible = activeStage === "planet" && targetRingOpacity > 0.01;
                depthMaskMesh.scale.setScalar(THREE.MathUtils.lerp(depthMaskMesh.scale.x, targetCoreScale * 1.006, 0.06));
            }

            // Nebula rotation
            if (nebulaPoints) {
                nebulaPoints.rotation.y += 0.00004;
            }
            updateComet(time, delta);

            if (orbitLinesGroup) {
                orbitLinesGroup.visible = activeStage === "planet" && SHOW_COMPANION_PLANETS;
            }
            if (companionGroup) {
                companionGroup.visible = activeStage === "planet" && SHOW_COMPANION_PLANETS;
            }

            // Mouse interaction interpolation
            currentMouse3D.lerp(targetMouse3D, 0.1);
            currentMouseIntensity += (mouseIntensityTarget - currentMouseIntensity) * 0.08;
            if (bodyMaterial) {
                bodyMaterial.uniforms.uMouse3D.value.copy(currentMouse3D);
                bodyMaterial.uniforms.uMouseIntensity.value = currentMouseIntensity;
            }

            displayGroup.scale.setScalar(THREE.MathUtils.lerp(displayGroup.scale.x, 1 + gestureSpread * 0.06, 0.06));

            manualRotY += 0.0016;
            displayGroup.rotation.y = THREE.MathUtils.lerp(displayGroup.rotation.y, manualRotY, 0.035);
            displayGroup.rotation.x = THREE.MathUtils.lerp(displayGroup.rotation.x, manualRotX + targetTilt, 0.035);

            cameraDistance = THREE.MathUtils.lerp(cameraDistance, targetCameraDistance, 0.08);
            const centerProgress = 1 - THREE.MathUtils.smoothstep(cameraDistance, MIN_CAMERA_DISTANCE, CAMERA_CENTERING_DISTANCE);
            camera.position.y = THREE.MathUtils.lerp(CAMERA_DEFAULT_Y, 0, centerProgress);
            camera.position.z = cameraDistance;
            camera.lookAt(0, 0, 0);
            cameraDistanceLabel.textContent = `视距 ${cameraDistance.toFixed(1)}`;

            updateCompanions(time);
            starPoints.rotation.y += 0.00008;

            composer.passes[1].strength = planet.ring ? 1.35 : 1.10;
            composer.render();
        }

        function updateCompanions(time) {
            companionGroup.children.forEach((pivot, index) => {
                const key = pivot.userData.key;
                const planet = PLANETS[key];
                const hidden = activeStage !== "planet" || !SHOW_COMPANION_PLANETS;
                const selected = key === activePlanetKey;
                const basePosition = pivot.userData.basePosition;
                pivot.visible = !hidden;
                pivot.position.copy(basePosition);
                pivot.position.y += Math.sin(time * 0.95 + index) * 0.035;

                const giantScale = key === "jupiter" || key === "saturn" ? 1.14 : 1;
                const selectedPulse = selected ? 0.2 + Math.sin(time * 2.4) * 0.035 : 0;
                pivot.scale.setScalar(giantScale + selectedPulse);
                pivot.rotation.y += planet.spin * 1.8;

                const halo = pivot.userData.halo;
                if (halo) {
                    halo.rotation.z += 0.006;
                }
            });
        }

        function moveBodyAttribute(ease) {
            const transitionActive = planetTransition.active;
            const vortexWeight = planetTransition.vortexWeight;
            const transitionSpin = planetTransition.eased * Math.PI * 1.65;
            const tiltSin = Math.sin(TRANSITION_VORTEX_TILT);
            const tiltCos = Math.cos(TRANSITION_VORTEX_TILT);

            for (let i = 0; i < BODY_COUNT; i++) {
                const seed = bodySeeds[i];
                const index = i * 3;
                const baseX = bodyTargets[index];
                const baseY = bodyTargets[index + 1];
                const baseZ = bodyTargets[index + 2];
                let targetX = baseX;
                let targetY = baseY;
                let targetZ = baseZ;

                if (transitionActive && vortexWeight > 0.001) {
                    const theta = seed.theta + seed.orbit + transitionSpin;
                    const baseRadius = Math.sqrt(baseX * baseX + baseY * baseY + baseZ * baseZ);
                    const vortexRadius = baseRadius * (1.02 + seed.shell * 0.34) + 1.25 + seed.noise * 1.9;
                    const flatX = Math.cos(theta) * vortexRadius;
                    const flatZ = Math.sin(theta) * vortexRadius;
                    const flatY = baseY * 0.16 + Math.sin(theta * 2.0 + seed.noise * Math.PI * 2) * 0.62;
                    const tiltedY = flatY * tiltCos - flatZ * tiltSin;
                    const tiltedZ = flatY * tiltSin + flatZ * tiltCos;
                    targetX = THREE.MathUtils.lerp(baseX, flatX, vortexWeight);
                    targetY = THREE.MathUtils.lerp(baseY, tiltedY, vortexWeight);
                    targetZ = THREE.MathUtils.lerp(baseZ, tiltedZ, vortexWeight);
                }

                const spreadX = baseX * (0.5 + seed.shell * 1.35) + Math.cos(seed.orbit) * (1.8 + seed.noise * 3.2);
                const spreadY = baseY * (0.4 + seed.noise * 1.35) + Math.sin(seed.theta * 2.1) * 2.4;
                const spreadZ = baseZ * (0.5 + seed.shell * 1.35) + Math.sin(seed.orbit) * (1.8 + seed.noise * 3.2);
                bodyPositions[index] += (targetX + spreadX * gestureSpread - bodyPositions[index]) * ease;
                bodyPositions[index + 1] += (targetY + spreadY * gestureSpread - bodyPositions[index + 1]) * ease;
                bodyPositions[index + 2] += (targetZ + spreadZ * gestureSpread - bodyPositions[index + 2]) * ease;
            }
        }

        function moveRingAttribute(ease) {
            const transitionActive = planetTransition.active;
            const vortexWeight = planetTransition.vortexWeight;
            const transitionSpin = planetTransition.eased * Math.PI * 1.45;
            const tiltSin = Math.sin(TRANSITION_RING_TILT);
            const tiltCos = Math.cos(TRANSITION_RING_TILT);

            for (let i = 0; i < RING_COUNT; i++) {
                const seed = ringSeeds[i];
                const index = i * 3;
                const baseX = ringTargets[index];
                const baseY = ringTargets[index + 1];
                const baseZ = ringTargets[index + 2];
                let targetX = baseX;
                let targetY = baseY;
                let targetZ = baseZ;

                if (transitionActive && vortexWeight > 0.001) {
                    const theta = seed.angle + transitionSpin + seed.band * Math.PI * 2;
                    const baseRadius = Math.sqrt(baseX * baseX + baseZ * baseZ);
                    const vortexRadius = baseRadius * (1.04 + seed.radius * 0.26) + 1.8 + seed.band * 2.8;
                    const flatX = Math.cos(theta) * vortexRadius;
                    const flatZ = Math.sin(theta) * vortexRadius;
                    const flatY = baseY * 0.3 + Math.sin(theta * 1.7 + seed.gap * Math.PI * 2) * 0.54;
                    const tiltedY = flatY * tiltCos - flatZ * tiltSin;
                    const tiltedZ = flatY * tiltSin + flatZ * tiltCos;
                    targetX = THREE.MathUtils.lerp(baseX, flatX, vortexWeight);
                    targetY = THREE.MathUtils.lerp(baseY, tiltedY, vortexWeight);
                    targetZ = THREE.MathUtils.lerp(baseZ, tiltedZ, vortexWeight);
                }

                const spreadRadius = 2.4 + seed.radius * 8.2;
                const spreadX = Math.cos(seed.angle) * spreadRadius;
                const spreadY = seed.height * (3.8 + seed.radius * 4.5) + Math.sin(seed.angle * 2.4) * 0.9;
                const spreadZ = Math.sin(seed.angle) * spreadRadius;
                ringPositions[index] += (targetX + spreadX * gestureSpread - ringPositions[index]) * ease;
                ringPositions[index + 1] += (targetY + spreadY * gestureSpread - ringPositions[index + 1]) * ease;
                ringPositions[index + 2] += (targetZ + spreadZ * gestureSpread - ringPositions[index + 2]) * ease;
            }
        }

        function moveAttribute(current, target, ease) {
            for (let i = 0; i < current.length; i++) {
                current[i] += (target[i] - current[i]) * ease;
            }
        }

        function pickCompanion(event) {
            if (activeStage !== "planet" || !SHOW_COMPANION_PLANETS) return null;
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const hits = raycaster.intersectObjects(companionObjects, true);
            if (!hits.length) return null;
            return hits[0].object.userData.key;
        }

        function createParticleTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext("2d");
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, "rgba(255,255,255,1)");
            gradient.addColorStop(0.35, "rgba(255,255,255,0.78)");
            gradient.addColorStop(1, "rgba(255,255,255,0)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        function createNebulaTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext("2d");
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
            gradient.addColorStop(0.25, "rgba(255, 255, 255, 0.45)");
            gradient.addColorStop(0.55, "rgba(255, 255, 255, 0.12)");
            gradient.addColorStop(1, "rgba(255, 255, 255, 0)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function randomScatter(radius) {
            const theta = Math.random() * Math.PI * 2;
            const z = Math.random() * 2 - 1;
            const root = Math.sqrt(1 - z * z);
            const r = radius * Math.pow(Math.random(), 0.35);
            return {
                x: r * root * Math.cos(theta),
                y: r * z,
                z: r * root * Math.sin(theta)
            };
        }
    </script>
</body>
