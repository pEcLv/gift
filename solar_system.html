<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子礼物</title>
    <style>
        :root {
            --gold: #f0bf62;
            --gold-soft: rgba(240, 191, 98, 0.18);
            --ink: #05070d;
            --panel: rgba(5, 7, 13, 0.72);
            --line: rgba(240, 191, 98, 0.28);
            --text: #f7ead1;
            --muted: rgba(247, 234, 209, 0.62);
            --blue: #86d6ff;
            --red: #ff7f58;
            --green: #67de99;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #03050b;
            color: var(--text);
            font-family: "Baskerville", "Songti SC", "STSong", Georgia, serif;
            user-select: none;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 18% 25%, rgba(155, 55, 34, 0.22), transparent 30%),
                radial-gradient(circle at 78% 44%, rgba(42, 112, 190, 0.24), transparent 34%),
                linear-gradient(130deg, #06040b 0%, #07121f 54%, #020309 100%);
            pointer-events: none;
        }

        #scene {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .chrome {
            position: fixed;
            z-index: 4;
            pointer-events: none;
        }

        .chrome * {
            pointer-events: auto;
        }

        .title-block {
            top: 28px;
            left: 34px;
            max-width: min(460px, calc(100vw - 120px));
        }

        .mode-switch {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            padding: 6px;
            border: 1px solid rgba(240, 191, 98, 0.24);
            border-radius: 8px;
            background: rgba(5, 7, 13, 0.56);
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.32);
        }

        body.embedded .mode-switch {
            display: none;
        }

        .mode-tab {
            min-width: 104px;
            height: 38px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            color: rgba(247, 234, 209, 0.62);
            font: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: color 180ms ease, background 180ms ease, border-color 180ms ease, transform 180ms ease;
        }

        .mode-tab:hover {
            color: var(--text);
            transform: translateY(-1px);
        }

        .mode-tab.active {
            color: var(--text);
            border-color: color-mix(in srgb, var(--active-planet, var(--gold)) 54%, transparent);
            background: color-mix(in srgb, var(--active-planet, var(--gold)) 16%, transparent);
            box-shadow: inset 0 0 18px color-mix(in srgb, var(--active-planet, var(--gold)) 18%, transparent);
        }

        .eyebrow {
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.86;
        }

        h1 {
            margin: 8px 0 0;
            font-size: clamp(32px, 5vw, 68px);
            line-height: 0.94;
            font-weight: 600;
            letter-spacing: 0;
            text-shadow: 0 0 34px rgba(240, 191, 98, 0.22);
        }

        .planet-readout {
            right: 34px;
            top: 30px;
            width: 292px;
            padding: 18px 18px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(9, 12, 21, 0.82), rgba(5, 7, 13, 0.62));
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            transition: opacity 240ms ease, transform 240ms ease;
        }

        .readout-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .readout-swatch {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--active-planet, #e6aa56);
            box-shadow: 0 0 26px var(--active-glow, rgba(240, 191, 98, 0.45));
            flex: 0 0 auto;
        }

        #planet-name {
            font-size: 24px;
            line-height: 1;
        }

        #planet-en {
            margin-top: 4px;
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #planet-summary {
            margin: 14px 0 0;
            color: rgba(247, 234, 209, 0.78);
            font-size: 14px;
            line-height: 1.65;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .metric {
            min-width: 0;
            border-top: 1px solid rgba(240, 191, 98, 0.2);
            padding-top: 8px;
        }

        .metric-value {
            display: block;
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metric-label {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 1.4px;
        }

        .ephemeris-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(134, 214, 255, 0.2);
        }

        .ephemeris-cell {
            min-width: 0;
        }

        .ephemeris-value {
            display: block;
            color: #d6f0ff;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ephemeris-label {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 1.4px;
        }

        .planet-nav {
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            width: min(1040px, calc(100vw - 36px));
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            gap: 8px;
            padding: 8px;
            border: 1px solid rgba(240, 191, 98, 0.22);
            border-radius: 8px;
            background: rgba(4, 6, 12, 0.62);
            backdrop-filter: blur(18px);
            box-shadow: 0 16px 70px rgba(0, 0, 0, 0.42);
            transition: opacity 240ms ease, transform 240ms ease;
        }

        .planet-button {
            min-width: 0;
            height: 54px;
            border: 1px solid rgba(247, 234, 209, 0.14);
            border-radius: 6px;
            background: rgba(247, 234, 209, 0.035);
            color: rgba(247, 234, 209, 0.7);
            font: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
        }

        .planet-button:hover {
            transform: translateY(-2px);
            border-color: rgba(247, 234, 209, 0.34);
            color: var(--text);
            background: rgba(247, 234, 209, 0.07);
        }

        .planet-button.active {
            border-color: var(--planet-color);
            color: var(--text);
            background: linear-gradient(180deg, color-mix(in srgb, var(--planet-color) 16%, transparent), rgba(247, 234, 209, 0.04));
            box-shadow: inset 0 0 18px color-mix(in srgb, var(--planet-color) 20%, transparent), 0 0 26px color-mix(in srgb, var(--planet-color) 18%, transparent);
        }

        .nav-orb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--planet-color);
            box-shadow: 0 0 16px color-mix(in srgb, var(--planet-color) 56%, transparent);
            flex: 0 0 auto;
        }

        .nav-label {
            min-width: 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fullscreen-button {
            top: 30px;
            right: 350px;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(240, 191, 98, 0.28);
            border-radius: 50%;
            background: rgba(5, 7, 13, 0.58);
            color: var(--gold);
            display: grid;
            place-items: center;
            cursor: pointer;
            backdrop-filter: blur(14px);
            transition: transform 180ms ease, color 180ms ease, border-color 180ms ease;
        }

        .fullscreen-button:hover {
            transform: scale(1.05);
            color: var(--text);
            border-color: rgba(247, 234, 209, 0.5);
        }

        .fullscreen-button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .gesture-panel {
            right: 34px;
            top: 252px;
            width: 292px;
            padding: 12px;
            border: 1px solid rgba(134, 214, 255, 0.26);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(7, 12, 20, 0.82), rgba(4, 6, 12, 0.62));
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34), inset 0 0 28px rgba(75, 162, 255, 0.06);
            transition: opacity 240ms ease, transform 240ms ease;
        }

        .video-shell {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(247, 234, 209, 0.14);
            border-radius: 6px;
            background: rgba(2, 3, 7, 0.86);
        }

        #camera-preview,
        #hand-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #camera-preview {
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.72;
        }

        #hand-overlay {
            transform: scaleX(-1);
        }

        .video-empty {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 16px;
            color: rgba(247, 234, 209, 0.66);
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        body.camera-on .video-empty {
            display: none;
        }

        .gesture-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .gesture-button {
            flex: 1 1 auto;
            height: 36px;
            border: 1px solid rgba(134, 214, 255, 0.5);
            border-radius: 6px;
            background: rgba(134, 214, 255, 0.12);
            color: var(--text);
            font: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: color 180ms ease, border-color 180ms ease, background 180ms ease, transform 180ms ease;
        }

        .gesture-button:hover {
            color: #fff;
            border-color: rgba(247, 234, 209, 0.48);
            transform: translateY(-1px);
        }

        .gesture-button:disabled {
            cursor: default;
            opacity: 0.72;
            transform: none;
        }

        .gesture-readout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .gesture-cell {
            min-width: 0;
            border-top: 1px solid rgba(134, 214, 255, 0.2);
            padding-top: 8px;
        }

        .gesture-value {
            display: block;
            color: var(--text);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gesture-label {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
        }

        .gesture-map {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            margin-top: 10px;
        }

        .gesture-token {
            min-width: 0;
            height: 34px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(247, 234, 209, 0.12);
            border-radius: 6px;
            background: rgba(247, 234, 209, 0.035);
            color: rgba(247, 234, 209, 0.62);
            font-size: 12px;
            transition: color 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
        }

        .gesture-token.active {
            color: var(--text);
            border-color: var(--token-color, var(--blue));
            background: color-mix(in srgb, var(--token-color, var(--blue)) 14%, transparent);
            box-shadow: inset 0 0 18px color-mix(in srgb, var(--token-color, var(--blue)) 18%, transparent);
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            background: #020309;
            transition: opacity 650ms ease;
        }

        .loader-mark {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(240, 191, 98, 0.22);
            border-top-color: var(--gold);
            animation: spin 1100ms linear infinite;
            box-shadow: 0 0 30px rgba(240, 191, 98, 0.28);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .title-block {
                left: 20px;
                top: 18px;
                max-width: calc(100vw - 40px);
            }

            .planet-readout {
                left: 20px;
                right: auto;
                top: auto;
                bottom: 104px;
                width: calc(100vw - 40px);
                padding: 14px;
            }

            .mode-switch {
                top: 18px;
                left: 50%;
            }

            .planet-nav {
                bottom: 14px;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;
            }

            .planet-button {
                height: 42px;
            }

            .nav-label {
                font-size: 12px;
            }

            .fullscreen-button {
                right: 18px;
                top: 18px;
            }

            .gesture-panel {
                right: 18px;
                top: 70px;
                width: 250px;
            }
        }

        @media (max-width: 520px) {
            .mode-switch {
                top: 92px;
                left: 20px;
                transform: none;
            }

            .planet-readout {
                display: none;
            }

            .planet-nav {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .planet-button {
                gap: 6px;
            }

            .nav-orb {
                width: 12px;
                height: 12px;
            }

            .gesture-panel {
                left: 18px;
                right: 18px;
                top: auto;
                bottom: 132px;
                width: auto;
            }

            .video-shell {
                display: none;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" defer></script>
</head>
<body data-stage="planet">
    <div id="scene"></div>

    <button class="chrome fullscreen-button" id="fullscreen" aria-label="切换全屏">
        <svg viewBox="0 0 24 24">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
    </button>

    <header class="chrome title-block">
        <div class="eyebrow" id="stage-eyebrow">Particle Solar System</div>
        <h1 id="stage-title">粒子太阳系</h1>
    </header>

    <aside class="chrome planet-readout" id="planet-readout">
        <div class="readout-top">
            <span class="readout-swatch" id="planet-swatch"></span>
            <div>
                <div id="planet-name">土星</div>
                <div id="planet-en">Saturn</div>
            </div>
        </div>
        <p id="planet-summary">金色冰粒环带和柔和气体层，以粒子轨道呈现。</p>
        <div class="metrics">
            <span class="metric">
                <span class="metric-value" id="metric-orbit">9.58 AU</span>
                <span class="metric-label">轨道</span>
            </span>
            <span class="metric">
                <span class="metric-value" id="metric-radius">9.45 R⊕</span>
                <span class="metric-label">半径</span>
            </span>
            <span class="metric">
                <span class="metric-value" id="metric-day">10.7h</span>
                <span class="metric-label">自转</span>
            </span>
        </div>
        <div class="ephemeris-strip">
            <span class="ephemeris-cell">
                <span class="ephemeris-value" id="ephemeris-date">--</span>
                <span class="ephemeris-label">历元</span>
            </span>
            <span class="ephemeris-cell">
                <span class="ephemeris-value" id="ephemeris-distance">--</span>
                <span class="ephemeris-label">日距</span>
            </span>
            <span class="ephemeris-cell">
                <span class="ephemeris-value" id="ephemeris-longitude">--</span>
                <span class="ephemeris-label">黄经</span>
            </span>
        </div>
    </aside>

    <nav class="chrome planet-nav" id="planet-nav" aria-label="太阳系行星"></nav>

    <section class="chrome gesture-panel" aria-label="摄像头手势控制">
        <div class="video-shell">
            <video id="camera-preview" playsinline muted></video>
            <canvas id="hand-overlay"></canvas>
            <div class="video-empty" id="video-empty">启动摄像头后，手势会作为鼠标和按钮之外的附加控制方式。</div>
        </div>
        <div class="gesture-actions">
            <button class="gesture-button" type="button" id="start-gesture">启动手势控制</button>
        </div>
        <div class="gesture-readout">
            <span class="gesture-cell">
                <span class="gesture-value" id="gesture-state">等待手势</span>
                <span class="gesture-label">Gesture</span>
            </span>
            <span class="gesture-cell">
                <span class="gesture-value" id="camera-distance">视距 28.0</span>
                <span class="gesture-label">Camera</span>
            </span>
        </div>
        <div class="gesture-map" aria-label="手势映射">
            <span class="gesture-token" data-gesture="pinch" style="--token-color: var(--blue)">捏住</span>
            <span class="gesture-token" data-gesture="pointLeft" style="--token-color: var(--gold)">向左</span>
            <span class="gesture-token" data-gesture="pointRight" style="--token-color: var(--gold)">向右</span>
            <span class="gesture-token" data-gesture="fist" style="--token-color: var(--red)">握拳</span>
            <span class="gesture-token" data-gesture="open" style="--token-color: var(--green)">张掌</span>
            <span class="gesture-token" data-gesture="twoHand" style="--token-color: var(--blue)">双手</span>
        </div>
    </section>

    <div id="loader">
        <div class="loader-mark"></div>
    </div>

            uniform float uTime;

            varying vec3 vColor;

            float hash(float n) { return fract(sin(n) * 753.5453123); }
            float noise(vec3 x) {
                vec3 p = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                float n = p.x + p.y * 157.0 + 113.0 * p.z;
                return mix(mix(mix(hash(n+0.0), hash(n+1.0), f.x),
                               mix(hash(n+157.0), hash(n+158.0), f.x), f.y),
                           mix(mix(hash(n+113.0), hash(n+114.0), f.x),
                               mix(hash(n+270.0), hash(n+271.0), f.x), f.y), f.z);
            }
            
            void main() {
                vLocalPos = position;
                vec3 pos = position;
                
                // 1. Swirling turbulence & smooth orbital wind shear
                if (uPlanetType > 0.5 && uPlanetType < 1.5) { // Venus swirling clouds
                    float theta = atan(pos.z, pos.x);
                    float swirl = sin(pos.y * 1.8 - uTime * 0.4) * 0.25 + cos(theta * 2.0 + uTime * 0.15) * 0.08;
                    float c = cos(swirl);
                    float s = sin(swirl);
                    float nx = pos.x * c - pos.z * s;
                    pos.z = pos.x * s + pos.z * c;
                    pos.x = nx;
                }
                else if (uPlanetType > 1.5 && uPlanetType < 2.5) { // Earth clouds drift
                    if (color.r > 0.8 && color.g > 0.8 && color.b > 0.8) {
                        pos = normalize(pos) * (length(pos) + 0.12);
                        float driftAngle = uTime * 0.026;
                        float c = cos(driftAngle);
                        float s = sin(driftAngle);
                        float nx = pos.x * c - pos.z * s;
                        pos.z = pos.x * s + pos.z * c;
                        pos.x = nx;
                    }
                }
                else if (uPlanetType > 2.5 && uPlanetType < 3.5) { // Jupiter smooth bands & Red Spot
                    float windSpeed = sin(pos.y * 4.0) * 0.14 * (uSpinSpeed * 50.0 + 0.5);
                    float shearAngle = windSpeed * uTime * 0.2;
                    float c = cos(shearAngle);
                    float s = sin(shearAngle);
                    float nx = pos.x * c - pos.z * s;
                    pos.z = pos.x * s + pos.z * c;
                    pos.x = nx;
                    
                    float rotSpot = -uTime * 0.035;
                    vec3 spotCenter = vec3(2.8 * cos(rotSpot), -0.9, 2.8 * sin(rotSpot));
                    float dToSpot = distance(pos, spotCenter);
                    if (dToSpot < 1.5) {
                        float pull = (1.5 - dToSpot) / 1.5;
                        vec3 normal = normalize(spotCenter);
                        vec3 swirlDir = cross(pos - spotCenter, normal);
                        pos += swirlDir * pull * 0.48;
                        pos += normal * pull * 0.06;
                    }
                }
                else if (uPlanetType > 3.5 && uPlanetType < 4.5) { // Saturn smooth wind shearing
                    float windSpeed = sin(pos.y * 3.0) * 0.08 * (uSpinSpeed * 50.0 + 0.5);
                    float shearAngle = windSpeed * uTime * 0.2;
                    float c = cos(shearAngle);
                    float s = sin(shearAngle);
                    float nx = pos.x * c - pos.z * s;
                    pos.z = pos.x * s + pos.z * c;
                    pos.x = nx;
                }
                else if (uPlanetType > 4.5 && uPlanetType < 5.5) { // Ice giant waves
                    float flow = noise(pos * 1.2 + vec3(0.0, uTime * 0.25, uTime * 0.08));
                    pos += normalize(pos) * flow * 0.05;

                if (uMouseIntensity > 0.01) {
                    vec3 diff = pos - uMouse3D;
                    float dist = length(diff);
                    if (dist < 4.8) {
                        float force = (1.0 - dist / 4.8) * uMouseIntensity;

                if (uPlanetType > 2.5 && uPlanetType < 4.5) { // Jupiter, Saturn chemical swirls
                    finalCol += vec3(sin(pos.y * 6.0 + uTime * 0.25) * 0.06, cos(pos.y * 4.0 - uTime * 0.15) * 0.04, 0.0);

        function sampleOrbitPath(key, date, segments) {
            const elements = orbitalElementsAt(key, date);
            const points = [];
            for (let i = 0; i <= segments; i++) {
                const eccentricAnomaly = (i / segments) * Math.PI * 2;
                const ecliptic = eclipticFromEccentricAnomaly(elements, eccentricAnomaly);
                points.push(toOrreryPosition(ecliptic));
            }
            return points;
        }

        function computeOrbitalState(key, date) {
            const elements = orbitalElementsAt(key, date);
            const correction = ORBIT_ELEMENTS[key].correction || [0, 0, 0, 0];
            const meanAnomalyDegrees = elements.L - elements.peri
                + correction[0] * elements.T * elements.T
                + correction[1] * Math.cos(DEG_TO_RAD * correction[3] * elements.T)
                + correction[2] * Math.sin(DEG_TO_RAD * correction[3] * elements.T);
            const meanAnomaly = normalizeRadians(meanAnomalyDegrees * DEG_TO_RAD);
            const eccentricAnomaly = solveKepler(meanAnomaly, elements.e);
            const ecliptic = eclipticFromEccentricAnomaly(elements, eccentricAnomaly);
            const longitude = THREE.MathUtils.euclideanModulo(Math.atan2(ecliptic.y, ecliptic.x) * RAD_TO_DEG, 360);

            return {
                ...ecliptic,
                distanceAu: Math.sqrt(ecliptic.x * ecliptic.x + ecliptic.y * ecliptic.y + ecliptic.z * ecliptic.z),
                longitudeDeg: longitude,
                eccentricAnomaly
            };
        }

        function orbitalElementsAt(key, date) {
            const source = ORBIT_ELEMENTS[key];
            const T = (julianDate(date) - J2000_JD) / 36525;
            const a = rateValue(source.a, T);
            const e = rateValue(source.e, T);
            const inclination = rateValue(source.i, T);
            const L = rateValue(source.L, T);
            const peri = rateValue(source.peri, T);
            const node = rateValue(source.node, T);

            return {
                T,
                a,
                e,
                inclination,
                L,
                peri,
                node,
                omega: peri - node
            };
        }

        function eclipticFromEccentricAnomaly(elements, eccentricAnomaly) {
            const orbitalX = elements.a * (Math.cos(eccentricAnomaly) - elements.e);
            const orbitalY = elements.a * Math.sqrt(1 - elements.e * elements.e) * Math.sin(eccentricAnomaly);
            const omega = elements.omega * DEG_TO_RAD;
            const node = elements.node * DEG_TO_RAD;
            const inclination = elements.inclination * DEG_TO_RAD;

            const cosOmega = Math.cos(node);
            const sinOmega = Math.sin(node);
            const cosInclination = Math.cos(inclination);
            const sinInclination = Math.sin(inclination);
            const cosOmegaPeri = Math.cos(omega);
            const sinOmegaPeri = Math.sin(omega);

            return {
                x: (cosOmegaPeri * cosOmega - sinOmegaPeri * sinOmega * cosInclination) * orbitalX
                    + (-sinOmegaPeri * cosOmega - cosOmegaPeri * sinOmega * cosInclination) * orbitalY,
                y: (cosOmegaPeri * sinOmega + sinOmegaPeri * cosOmega * cosInclination) * orbitalX
                    + (-sinOmegaPeri * sinOmega + cosOmegaPeri * cosOmega * cosInclination) * orbitalY,
                z: (sinOmegaPeri * sinInclination) * orbitalX
                    + (cosOmegaPeri * sinInclination) * orbitalY
            };
        }

        function solveKepler(meanAnomaly, eccentricity) {
            let eccentricAnomaly = meanAnomaly;
            for (let i = 0; i < 10; i++) {
                const delta = (meanAnomaly - (eccentricAnomaly - eccentricity * Math.sin(eccentricAnomaly)))
                    / (1 - eccentricity * Math.cos(eccentricAnomaly));
                eccentricAnomaly += delta;
                if (Math.abs(delta) < 1e-8) break;
            }
            return eccentricAnomaly;
        }

        function toOrreryPosition(ecliptic) {
            return new THREE.Vector3(
                ORRERY_CENTER.x + ecliptic.x * ORBIT_SCALE,
                ORRERY_CENTER.y + ecliptic.z * ORBIT_SCALE,
                ORRERY_CENTER.z + ecliptic.y * ORBIT_SCALE
            );
        }

        function julianDate(date) {
            return date.getTime() / MS_PER_DAY + JULIAN_UNIX_EPOCH;
        }

        function rateValue(pair, T) {
            return pair[0] + pair[1] * T;
        }

        function normalizeRadians(angle) {
            const tau = Math.PI * 2;
            return ((angle + Math.PI) % tau + tau) % tau - Math.PI;
        }
